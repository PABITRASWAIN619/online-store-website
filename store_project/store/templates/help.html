<!doctype html>
<html>
  <head>
    <title>Help & Support</title>

    <style>
      body {
        font-family: Arial;
        background: linear-gradient(to right, #eef2f3, #ffffff);
        margin: 0;
      }

      .container {
        width: 45%;
        margin: 50px auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        animation: fadeIn 0.5s ease-in-out;
      }

      h2 {
        text-align: center;
        color: #2a5298;
        margin-bottom: 10px;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 12px;
        margin-top: 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
      }

      textarea:focus {
        border-color: #2a5298;
        box-shadow: 0 0 8px rgba(42, 82, 152, 0.3);
      }

      button {
        background: linear-gradient(45deg, #2196f3, #21cbf3);
        color: white;
        padding: 10px 18px;
        border: none;
        margin-top: 15px;
        border-radius: 25px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      a {
        text-decoration: none;
      }

      .settings-btn {
        display: inline-block;
        margin-top: 15px;
        background: linear-gradient(45deg, #4caf50, #66bb6a);
        padding: 10px 18px;
        color: white;
        border-radius: 25px;
        transition: 0.3s;
      }

      .settings-btn:hover {
        transform: scale(1.05);
      }

      .faq {
        margin-top: 30px;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 10px;
      }

      .faq h3 {
        color: #ff9800;
        margin-bottom: 10px;
      }

      .faq p {
        margin: 5px 0;
      }

      .faq b {
        color: #333;
      }

      /* ANIMATION */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* MOBILE RESPONSIVE */
      @media (max-width: 768px) {
        .container {
          width: 90%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🛠 Help & Support</h2>

      <h2>Help & Support</h2>

      <form method="POST" action="/send-support/">
        {% csrf_token %}
        <textarea name="message" placeholder="Enter your issue"></textarea>
        <button type="submit">Send</button>
      </form>

      <a href="/settings/">Go to Settings</a>

      <div class="faq">
        <h3>📌 FAQ</h3>

        <p><b>How to track order?</b></p>
        <p>Go to Orders → Click Track Order</p>

        <p><b>How to cancel order?</b></p>
        <p>You can cancel when order status is Pending.</p>

        <p><b>Payment failed?</b></p>
        <p>Please retry payment or contact support.</p>
      </div>

      <br />

      <a href="/settings/">
        <button style="background: green">⚙ Settings</button>
      </a>
    </div>
  </body>
</html>
