<!doctype html>
<html>
  <head>
    <title>Support Chat</title>

    <style>
      body {
        font-family: Arial;
        background: #ece5dd;
        margin: 0;
      }

      .chat-box {
        max-width: 500px;
        margin: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #fff;
      }

      /* HEADER */
      .header {
        background: #075e54;
        color: white;
        padding: 15px;
        font-size: 18px;
      }

      .online {
        font-size: 12px;
        color: lightgreen;
      }

      /* MESSAGES */
      .messages {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
        background: #e5ddd5;
      }

      .msg {
        margin: 10px 0;
        padding: 10px;
        border-radius: 10px;
        max-width: 70%;
      }

      .user {
        background: #dcf8c6;
        margin-left: auto;
        text-align: right;
      }

      .admin {
        background: #fff;
        margin-right: auto;
      }

      /* INPUT */
      .input-box {
        display: flex;
        padding: 10px;
        background: #f0f0f0;
      }

      textarea {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: none;
        resize: none;
        outline: none;
      }

      button {
        margin-left: 10px;
        padding: 10px 15px;
        border: none;
        background: #075e54;
        color: white;
        border-radius: 50%;
        cursor: pointer;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .chat-box {
          width: 100%;
          height: 100vh;
        }
      }
    </style>
  </head>

  <body>
    <div
      id="notify"
      style="display: none; background: red; color: white; padding: 10px"
    >
      🔔 New reply received!
    </div>
    <div class="chat-box">
      <!-- HEADER -->
      <div class="header">
        🛠 Support Chat <br />
        <span class="online">🟢 Support Online</span>
      </div>

      <!-- CHAT -->
      <div class="messages" id="chat"></div>

      <!-- INPUT -->
      <form class="input-box" method="POST" action="/send-support/">
        {% csrf_token %}
        <textarea
          name="message"
          placeholder="Type your message..."
          required
        ></textarea>
        <button type="submit">➤</button>
      </form>
    </div>

    <!-- 🔊 SOUND -->
    <audio id="notifSound">
      <source
        src="https://www.soundjay.com/buttons/sounds/button-3.mp3"
        type="audio/mpeg"
      />
    </audio>

    <script>
      let lastReplies = 0;

      function loadMessages() {
        fetch("/get-messages/")
          .then((res) => res.json())
          .then((data) => {
            let chat = document.getElementById("chat");
            chat.innerHTML = "";

            let replyCount = 0;

            data.messages.forEach((msg) => {
              // USER MESSAGE
              chat.innerHTML += `
          <div class="msg user">${msg.message}</div>
        `;

              // ADMIN REPLY
              if (msg.is_replied) {
                chat.innerHTML += `
            <div class="msg admin">${msg.reply}</div>
          `;
                replyCount++;
              }
            });

            // 🔔 PLAY SOUND ONLY IF NEW REPLY
            if (replyCount > lastReplies) {
              document.getElementById("notifSound").play();
            }

            lastReplies = replyCount;

            // AUTO SCROLL
            chat.scrollTop = chat.scrollHeight;
          });
      }

      // AUTO REFRESH EVERY 3 SEC
      setInterval(loadMessages, 3000);

      // FIRST LOAD
      loadMessages();
      setInterval(() => {
        fetch(window.location.href)
          .then((res) => res.text())
          .then((html) => {
            if (html.includes("is_replied")) {
              document.getElementById("notify").style.display = "block";
            }
          });
      }, 5000);
    </script>
  </body>
</html>
