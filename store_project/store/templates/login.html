<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login-Shopmate</title>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Roboto", sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: url("https://img.freepik.com/premium-vector/login-page-system-abstract-background-template_143055-704.jpg?w=1380")
          no-repeat center center fixed;
        background-size: cover;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 0;
      }

      .login-box {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.95);
        padding: 50px 40px;
        border-radius: 20px;
        width: 380px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        text-align: center;
        animation: fadeInUp 1s ease forwards;
      }

      .login-box h2 {
        font-size: 2rem;
        margin-bottom: 30px;
        color: #333;
      }

      input {
        width: 100%;
        padding: 15px 18px;
        margin-bottom: 20px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        cursor: pointer;
      }

      a {
        display: block;
        margin-top: 15px;
        color: #667eea;
        text-decoration: none;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <h2>Welcome Back</h2>

      <form method="POST">
        {% csrf_token %}

        <input
          type="email"
          name="email"
          placeholder="Enter your gmail"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />

        <button type="submit">Login</button>
      </form>

      <a href="/signup/">Create Account</a>
    </div>
  </body>
</html>
