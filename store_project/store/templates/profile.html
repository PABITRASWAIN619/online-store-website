<!doctype html>
<html>
  <head>
    <title>Instagram Profile Style</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #f5f6fa;
        transition: 0.3s;
      }

      body.dark {
        background: #121212;
        color: white;
      }

      /* PROFILE CONTAINER */
      .container {
        width: 420px;
        margin: 50px auto;
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: 0.3s;
      }

      body.dark .container {
        background: #1e1e1e;
      }

      /* STORY CIRCLE */
      .story {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        padding: 4px;
        background: linear-gradient(45deg, #ff00cc, #3333ff, #00ff99);
        margin: auto;
      }

      .story img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid white;
      }

      /* NAME */
      h2 {
        margin: 10px 0;
      }

      /* STATS */
      .stats {
        display: flex;
        justify-content: space-around;
        margin: 20px 0;
      }

      .box {
        background: #eee;
        padding: 10px;
        border-radius: 10px;
        width: 100px;
      }

      body.dark .box {
        background: #2a2a2a;
      }

      /* BUTTONS */
      button {
        padding: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 5px;
      }

      .edit-btn {
        background: #4a90e2;
        color: white;
      }

      .dark-btn {
        background: black;
        color: white;
      }

      /* MODAL */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
      }

      .modal-content {
        background: white;
        width: 300px;
        margin: 100px auto;
        padding: 20px;
        border-radius: 10px;
      }

      body.dark .modal-content {
        background: #2a2a2a;
        color: white;
      }

      /* PREVIEW IMAGE */
      #preview {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- STORY PROFILE -->
      <div class="story">
        {% if profile.image %}
        <img src="{{ profile.image.url }}" id="profileImg" />
        {% else %}
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" />
        {% endif %}
      </div>

      <h2>{{ request.user.username }}</h2>
      <p>{{ request.user.email }}</p>

      <!-- STATS -->
      <div class="stats">
        <div class="box">
          <h3>{{ orders_count }}</h3>
          <p>Orders</p>
        </div>

        <div class="box">
          <h3>{{ cart_count }}</h3>
          <p>Cart</p>
        </div>

        <div class="box">
          <h3>0</h3>
          <p>Wishlist</p>
        </div>
      </div>

      <!-- BUTTONS -->
      <button class="edit-btn" onclick="openModal()">Edit Profile</button>
      <button class="dark-btn" onclick="toggleDark()">🌙 Dark Mode</button>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Edit Profile</h3>

        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <input
            type="text"
            name="phone"
            value="{{ profile.phone }}"
            placeholder="Phone"
          />

          <input
            type="file"
            name="image"
            id="fileInput"
            onchange="previewImage(event)"
          />

          <img id="preview" />

          <br /><br />

          <button type="submit" class="edit-btn">Save</button>
          <button type="button" onclick="closeModal()">Close</button>
        </form>
      </div>
    </div>
    <button class="edit-btn" onclick="openModal()">Edit Profile</button>
    <button class="dark-btn" onclick="toggleDark()">🌙 Dark Mode</button>

    <!-- BACK BUTTON -->
    <a href="/home/">
      <button
        style="
          background: linear-gradient(45deg, #ff9800, #ff5722);
          color: white;
          padding: 10px 15px;
          border: none;
          border-radius: 10px;
          cursor: pointer;
          margin-top: 10px;
        "
      >
        ⬅ Back to Home
      </button>
    </a>
    <script>
      function openModal() {
        document.getElementById("modal").style.display = "block";
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
      }

      function toggleDark() {
        document.body.classList.toggle("dark");
      }

      function previewImage(event) {
        let reader = new FileReader();
        reader.onload = function () {
          document.getElementById("preview").src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
      }
    </script>
  </body>
</html>
