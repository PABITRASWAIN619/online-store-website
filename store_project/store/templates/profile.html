<h1>👤 My Profile</h1>

<img src="{{ profile.image.url }}" width="100" />

<p>Name: {{ request.user.username }}</p>
<p>Email: {{ request.user.email }}</p>

<form method="POST" enctype="multipart/form-data">
  {% csrf_token %}

  <input
    type="text"
    name="phone"
    placeholder="Phone"
    value="{{ profile.phone }}"
  />
  <input type="file" name="image" />

  <button type="submit">Update</button>
</form>
