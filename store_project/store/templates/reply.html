<!doctype html>
<html>
  <head>
    <title>Reply</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #eef2f3, #ffffff);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .box {
        width: 420px;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        animation: fadeIn 0.4s ease-in-out;
      }

      h2 {
        text-align: center;
        color: #1e3c72;
        margin-bottom: 15px;
      }

      .msg {
        background: #f5f5f5;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 15px;
        font-size: 14px;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
        resize: none;
      }

      textarea:focus {
        border-color: #2a5298;
        box-shadow: 0 0 8px rgba(42, 82, 152, 0.3);
      }

      button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background: linear-gradient(45deg, #1e3c72, #2a5298);
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.03);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      a {
        display: block;
        text-align: center;
        margin-top: 10px;
        text-decoration: none;
        color: #555;
        font-size: 14px;
      }

      a:hover {
        color: #1e3c72;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>💬 Reply to {{ issue.user.username }}</h2>

      <div class="msg">
        <b>User Message:</b><br />
        {{ issue.message }}
      </div>

      <form method="POST">
        {% csrf_token %}
        <textarea
          name="reply"
          placeholder="Type your reply..."
          required
        ></textarea>

        <button type="submit">Send Reply</button>
      </form>

      <a href="/admin-dashboard/">⬅ Back to Dashboard</a>
    </div>
  </body>
</html>
