<!doctype html>
<html>
  <head>
    <title>OTP Login</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        font-family: Arial;
      }

      .box {
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 15px;
        text-align: center;
      }

      input,
      button {
        padding: 10px;
        width: 100%;
        margin: 10px 0;
        border: none;
        border-radius: 10px;
      }

      button {
        background: orange;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>OTP Login</h2>

      <form method="POST">
        {% csrf_token %}
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <button type="submit">Send OTP</button>
      </form>
    </div>

    {% if messages %}
    <script>
      {% for message in messages %}
      Swal.fire("{{ message }}");
      {% endfor %}
    </script>
    {% endif %}
  </body>
</html>
