<!doctype html>
<html>
  <head>
    <title>Settings</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
      }

      .container {
        width: 50%;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      input {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
      }

      button {
        background: black;
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>⚙ Account Settings</h2>

      <form>
        <label>Name</label>
        <input type="text" value="{{ request.user.username }}" />

        <label>Email</label>
        <input type="email" value="{{ request.user.email }}" />

        <label>New Password</label>
        <input type="password" />

        <button>Update Profile</button>
      </form>

      <br />

      <a href="/help/">
        <button style="background: blue">Help & Support</button>
      </a>
      <h2>Settings</h2>

      <p>Name: {{ request.user.username }}</p>
      <p>Email: {{ request.user.email }}</p>

      <a href="/help/">Back to Help</a>
    </div>
  </body>
</html>
