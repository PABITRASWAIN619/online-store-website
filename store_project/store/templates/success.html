<!doctype html>
<html>
  <head>
    <title>Success</title>
    <style>
      body {
        font-family: Arial;
        background: #e8f5e9;
        text-align: center;
      }

      .box {
        margin-top: 100px;
        background: white;
        padding: 40px;
        width: 40%;
        margin-left: auto;
        margin-right: auto;
        border-radius: 10px;
        box-shadow: 0 0 10px #ccc;
      }

      .tick {
        font-size: 60px;
        color: green;
      }

      button {
        padding: 10px 20px;
        background: green;
        color: white;
        border: none;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="tick">✔</div>
      <h2>order Successful!</h2>
      <p>Your order has been placed successfully.</p>

      <a href="/orders/">
        <button>View Orders</button>
      </a>
    </div>
  </body>
</html>
